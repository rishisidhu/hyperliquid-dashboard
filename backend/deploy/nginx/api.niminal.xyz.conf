# api.niminal.xyz — reverse proxy for the dashboard backend (SPEC §8, §8.5).
# AUTHORED IN PHASE 8 — applied in Phase 9 as a NEW, ISOLATED server block.
# NEVER edit the existing aigraduate.com blocks. Rate-limit zones are defined in
# rate-limits.conf (http context, conf.d drop-in). The Node process listens on
# 127.0.0.1:8765 only; this is the sole public door.
#
# TLS on this box is managed by acme.sh (NOT certbot). The api cert is issued via
# its own webroot (/var/www/certbot, separate from the blog's webroot) and
# installed to a dedicated dir below via `acme.sh --install-cert`, which also
# registers an nginx-reload on renewal — joining the existing daily acme.sh cron
# without touching the blog's cert/webroot/renewal. See RUNBOOK.md §4.

# HTTP → HTTPS (plus ACME HTTP-01 challenge room for acme.sh)
server {
    listen 80;
    listen [::]:80;
    server_name api.niminal.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # Older `listen ... ssl http2;` form to match the nginx version on the box
    # (the newer `http2 on;` directive isn't supported there).
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.niminal.xyz;

    # TLS — SEPARATE cert for this subdomain, installed by acme.sh --install-cert
    # to this dedicated dir (NOT certbot's /etc/letsencrypt/live, and NOT the
    # blog's /etc/letsencrypt/aigraduate.com). acme.sh .cer naming.
    ssl_certificate     /etc/letsencrypt/api.niminal.xyz/fullchain.cer;
    ssl_certificate_key /etc/letsencrypt/api.niminal.xyz/api.niminal.xyz.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # --- §8.5 hardening ---
    server_tokens off;                 # hide nginx version
    client_max_body_size 1k;           # read-only GET API — no uploads
    client_body_timeout 10s;
    client_header_timeout 10s;

    # per-IP caps (zones from rate-limits.conf)
    limit_req  zone=hldash_req burst=20 nodelay;
    limit_conn hldash_conn 20;
    limit_req_status 429;
    limit_conn_status 429;

    # CORS is handled by the Node app (locked to https://niminal.xyz); do not
    # duplicate it here. Node already emits generic JSON errors (no stack traces).

    # SSE stream — buffering OFF + long read timeout so events flow immediately
    # and the connection isn't closed mid-stream (SPEC §8).
    location = /stream {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    # One-shot snapshot (REST fallback) — public.
    location = /board {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # On-demand funding-history sparkline — public; coin is validated app-side
    # against the universe allow-list (never forwarded raw to Hyperliquid).
    location = /funding-history {
        proxy_pass http://127.0.0.1:8765;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # /health is INTERNAL (local ops only) — never exposed publicly (§8.5 item 4).
    location = /health {
        return 404;
    }

    # Nothing else is part of the public API.
    location / {
        return 404;
    }
}
