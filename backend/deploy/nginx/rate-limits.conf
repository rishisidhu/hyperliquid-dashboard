# Per-IP rate-limit zones for the dashboard backend (SPEC §8.5 DoS guard).
# AUTHORED IN PHASE 8 — applied in Phase 9. These directives are HTTP-CONTEXT, so
# drop this file in /etc/nginx/conf.d/ (loaded inside the existing http{} block)
# — do NOT paste them into the blog's nginx.conf or any blog server block.
# Referenced by api.niminal.xyz.conf.

# new-request rate per client IP (the API is read-only GETs; SSE is one long
# connection, not repeated requests, so a modest rate is plenty).
limit_req_zone  $binary_remote_addr  zone=hldash_req:10m  rate=10r/s;

# concurrent connections per client IP (caps how many SSE streams one IP holds;
# the app also enforces a global MAX_SSE_CLIENTS cap and replies 503 beyond it).
limit_conn_zone $binary_remote_addr  zone=hldash_conn:10m;
