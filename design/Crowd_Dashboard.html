    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).

    }

    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {

ottom:1px solid var(--border);font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--text-3)\">\n        <span>Market<\u002Fspan>\n        <span style=\"display:flex;align-items:center;gap:5px;color:var(--text-1)\">Crowd skew <span style=\"color:var(--text-2);font-size:9px\">▼<\u002Fspan><\u002Fspan>\n        <span style=\"text-align:right\">Funding ann.<\u002Fspan>\n        <span style=\"text-align:right\">Open int.<\u002Fspan>\n        <span style=\"text-align:right\">24h<\u002Fspan>\n        <span style=\"text-align:right\">24h vol<\u002Fspan>\n        <span>OI trend<\u002Fspan>\n      <\u002Fdiv>\n      <!-- rows -->\n      <sc-for list=\"{{ rows }}\" as=\"r\" hint-placeholder-count=\"12\">\n        <div style=\"display:grid;grid-template-columns:var(--board-cols);align-items:center;gap:14px;min-height:46px;padding:7px 16px;border-bottom:1px solid var(--border);opacity:{{ r.dim }}\" style-hover=\"background:var(--surface-2)\">\n          <!-- market -->\n          <div style=\"display:flex;flex-direction:column;gap:2px;min-width:0\">\n            <div style=\"display:flex;align-items:center;gap:7px\">\n              <span style=\"font-weight:600;font-size:13.5px\">{{ r.coin }}<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--text-4);border:1px solid var(--border);border-radius:3px;padding:0 4px\">{{ r.lev }}<\u002Fspan>\n              <sc-if value=\"{{ r.stale }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.08em;color:var(--stale);border:1px solid color-mix(in oklch,var(--stale),transparent 60%);border-radius:3px;padding:0 4px\">STALE {{ r.staleAge }}<\u002Fspan><\u002Fsc-if>\n            <\u002Fdiv>\n            <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-3)\">{{ r.price }}<\u002Fspan>\n          <\u002Fdiv>\n          <!-- crowd skew badge -->\n          <div style=\"display:flex;align-items:center;gap:10px\">\n            <span style=\"display:flex;gap:3px;align-items:flex-end\">\n              <sc-if value=\"{{ r.isBalanced }}\" hint-placeholder-val=\"{{ false }}\">\n                <span style=\"display:flex;align-items:center;gap:3px;height:16px\"><span style=\"width:30px;height:2px;background:var(--balanced);border-radius:1px\"><\u002Fspan><\u002Fspan>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ r.notBalanced }}\" hint-placeholder-val=\"{{ true }}\">\n                <sc-for list=\"{{ r.pips }}\" as=\"p\" hint-placeholder-count=\"5\"><span style=\"width:6px;height:16px;border-radius:2px;background:{{ p.color }}\"><\u002Fspan><\u002Fsc-for>\n              <\u002Fsc-if>\n            <\u002Fspan>\n            <span style=\"font-size:12.5px;font-weight:500;color:{{ r.skewTextColor }}\">{{ r.label }}<\u002Fspan>\n          <\u002Fdiv>\n          <!-- funding -->\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;text-align:right;color:{{ r.fundingColor }}\">{{ r.funding }}<\u002Fspan>\n          <!-- oi -->\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;text-align:right;color:var(--text-2)\">{{ r.oi }}<\u002Fspan>\n          <!-- 24h change (monochrome, caret-coded) -->\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:12.5px;text-align:right;color:{{ r.chgColor }}\">{{ r.chg }}<\u002Fspan>\n          <!-- vol -->\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;text-align:right;color:var(--text-3)\">{{ r.vol }}<\u002Fspan>\n          <!-- oi trend -->\n          <div style=\"display:flex;align-items:center;gap:6px\">\n            <sc-if value=\"{{ r.trend.warming }}\" hint-placeholder-val=\"{{ false }}\">\n              <span style=\"width:7px;height:7px;border-radius:50%;background:var(--text-3);animation:warm 1.6s ease-in-out infinite\"><\u002Fspan>\n              <span style=\"font-size:12px;color:var(--text-3);font-style:italic\">Warming up<\u002Fspan>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ r.trend.normal }}\" hint-placeholder-val=\"{{ true }}\">\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;color:{{ r.trend.color }}\">{{ r.trend.glyph }}<\u002Fspan>\n              <span style=\"font-size:12px;color:var(--text-2)\">{{ r.trend.word }}<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-4)\">{{ r.trend.pct }}<\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- ════════════════ DESIGN REFERENCE APPENDIX ════════════════ -->\n    <div style=\"margin-top:64px;padding-top:26px;border-top:1px solid var(--border)\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;color:var(--text-3);text-transform:uppercase\">Design system reference<\u002Fdiv>\n      <div style=\"font-size:20px;font-weight:600;margin-top:6px;letter-spacing:-.01em\">Tokens, scales &amp; states<\u002Fdiv>\n      <div style=\"font-size:13px;color:var(--text-2);margin-top:5px;max-width:620px;line-height:1.55\">Color is signal, never theme. Direction is carried by the plain-language label and accent hue; <em>intensity<\u002Fem> is carried by filled segments — so 0.04 and 0.84 are unmistakable without relying on red/green.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- INTENSITY SCALE -->\n    <div data-screen-label=\"Intensity scale\" style=\"margin-top:30px\">\n      <div style=\"font-size:13px;font-weight:600;margin-bottom:3px\">Intensity scale · 0 → 1<\u002Fdiv>\n      <div style=\"font-size:12px;color:var(--text-3);margin-bottom:16px\">5 segments fill as the crowd stretches; hue lightness &amp; chroma ramp with it. Balanced (0) shows a neutral axis tick — present, not empty.<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n        <div style=\"background:var(--surface-1);border:1px solid var(--border);border-radius:9px;padding:16px 18px\">\n          <div style=\"font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--long);font-weight:600;margin-bottom:14px\">Longs crowded<\u002Fdiv>\n          <sc-for list=\"{{ longStops }}\" as=\"s\" hint-placeholder-count=\"6\">\n            <div style=\"display:grid;grid-template-columns:46px auto 1fr;align-items:center;gap:14px;padding:6px 0\">\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-1)\">{{ s.t }}<\u002Fspan>\n              <span style=\"display:flex;gap:3px;align-items:flex-end;width:54px\">\n                <sc-if value=\"{{ s.balanced }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:30px;height:2px;background:var(--balanced);border-radius:1px;margin:7px 0\"><\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{ s.notBalanced }}\" hint-placeholder-val=\"{{ true }}\"><sc-for list=\"{{ s.pips }}\" as=\"p\" hint-placeholder-count=\"5\"><span style=\"width:7px;height:16px;border-radius:2px;background:{{ p.color }}\"><\u002Fspan><\u002Fsc-for><\u002Fsc-if>\n              <\u002Fspan>\n              <span style=\"font-size:12px;color:var(--text-3)\">{{ s.note }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"background:var(--surface-1);border:1px solid var(--border);border-radius:9px;padding:16px 18px\">\n          <div style=\"font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--short);font-weight:600;margin-bottom:14px\">Shorts crowded<\u002Fdiv>\n          <sc-for list=\"{{ shortStops }}\" as=\"s\" hint-placeholder-count=\"6\">\n            <div style=\"display:grid;grid-template-columns:46px auto 1fr;align-items:center;gap:14px;padding:6px 0\">\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-1)\">{{ s.t }}<\u002Fspan>\n              <span style=\"display:flex;gap:3px;align-items:flex-end;width:54px\">\n                <sc-if value=\"{{ s.balanced }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:30px;height:2px;background:var(--balanced);border-radius:1px;margin:7px 0\"><\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{ s.notBalanced }}\" hint-placeholder-val=\"{{ true }}\"><sc-for list=\"{{ s.pips }}\" as=\"p\" hint-placeholder-count=\"5\"><span style=\"width:7px;height:16px;border-radius:2px;background:{{ p.color }}\"><\u002Fspan><\u002Fsc-for><\u002Fsc-if>\n              <\u002Fspan>\n              <span style=\"font-size:12px;color:var(--text-3)\">{{ s.note }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- STATES GALLERY -->\n    <div data-screen-label=\"States\" style=\"margin-top:30px\">\n      <div style=\"font-size:13px;font-weight:600;margin-bottom:3px\">States the board must handle<\u002Fdiv>\n      <div style=\"font-size:12px;color:var(--text-3);margin-bottom:16px\">Each rendered exactly as it appears in a row — never as an error or empty cell.<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:12px\">\n        <sc-for list=\"{{ states }}\" as=\"st\" hint-placeholder-count=\"5\">\n          <div style=\"background:var(--surface-1);border:1px solid var(--border);border-radius:9px;padding:14px;display:flex;flex-direction:column;gap:11px;min-height:128px\">\n            <div style=\"font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-2);font-weight:600\">{{ st.title }}<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:9px;min-height:20px\">\n              <span style=\"display:flex;gap:3px;align-items:flex-end\">\n                <sc-if value=\"{{ st.balanced }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:28px;height:2px;background:var(--balanced);border-radius:1px\"><\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{ st.warming }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--text-3);animation:warm 1.6s ease-in-out infinite\"><\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{ st.pipped }}\" hint-placeholder-val=\"{{ false }}\"><sc-for list=\"{{ st.pips }}\" as=\"p\" hint-placeholder-count=\"5\"><span style=\"width:6px;height:16px;border-radius:2px;background:{{ p.color }}\"><\u002Fspan><\u002Fsc-for><\u002Fsc-if>\n              <\u002Fspan>\n              <span style=\"font-size:12.5px;font-weight:500;color:{{ st.labelColor }};font-style:{{ st.italic }}\">{{ st.label }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:11.5px;color:var(--text-3);line-height:1.5;text-wrap:pretty;margin-top:auto\">{{ st.note }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- TOKENS + TYPE + TOOLTIP -->\n    <div style=\"display:grid;grid-template-columns:1.3fr 1fr;gap:14px;margin-top:30px\">\n      <!-- swatches -->\n      <div data-screen-label=\"Color tokens\" style=\"background:var(--surface-1);border:1px solid var(--border);border-radius:9px;padding:16px 18px\">\n        <div style=\"font-size:13px;font-weight:600;margin-bottom:14px\">Color tokens<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px\">\n          <div>\n            <div style=\"font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-4);margin-bottom:9px\">Base &amp; text<\u002Fdiv>\n            <sc-for list=\"{{ baseSwatches }}\" as=\"c\" hint-placeholder-count=\"9\">\n              <div style=\"display:flex;align-items:center;gap:10px;padding:3px 0\">\n                <span style=\"width:18px;height:18px;border-radius:4px;border:1px solid var(--border-strong);background:{{ c.val }}\"><\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-2);flex:1\">{{ c.name }}<\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text-4)\">{{ c.val }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-4);margin-bottom:9px\">Meaning<\u002Fdiv>\n            <sc-for list=\"{{ meaningSwatches }}\" as=\"c\" hint-placeholder-count=\"7\">\n              <div style=\"display:flex;align-items:center;gap:10px;padding:3px 0\">\n                <span style=\"width:18px;height:18px;border-radius:4px;border:1px solid var(--border-strong);background:{{ c.val }}\"><\u002Fspan>\n                <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:{{ c.val }};flex:1\">{{ c.name }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <!-- type + tooltip -->\n      <div style=\"display:flex;flex-direction:column;gap:14px\">\n        <div data-screen-label=\"Type scale\" style=\"background:var(--surface-1);border:1px solid var(--border);border-radius:9px;padding:16px 18px\">\n          <div style=\"font-size:13px;font-weight:600;margin-bottom:4px\">Type<\u002Fdiv>\n          <div style=\"font-size:11.5px;color:var(--text-3);margin-bottom:13px;font-family:'JetBrains Mono',monospace\">Geist · UI &nbsp;/&nbsp; JetBrains Mono · numerics<\u002Fdiv>\n          <sc-for list=\"{{ typeSamples }}\" as=\"t\" hint-placeholder-count=\"5\">\n            <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding:4px 0;border-bottom:1px solid var(--border)\">\n              <span style=\"font-family:{{ t.fam }};font-size:{{ t.px }};font-weight:{{ t.wt }};color:var(--text-1);line-height:1.2\">{{ t.sample }}<\u002Fspan>\n              <span style=\"font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--text-4);flex:none\">{{ t.label }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <!-- tooltip example (shown open) -->\n        <div data-screen-label=\"Tooltip\" style=\"background:var(--surface-1);border:1px solid var(--border);border-radius:9px;padding:16px 18px\">\n          <div style=\"font-size:13px;font-weight:600;margin-bottom:12px\">Education · inline tooltip<\u002Fdiv>\n          <div style=\"font-size:13px;color:var(--text-2);line-height:1.6\">SOL shorts pay <span style=\"color:var(--text-1);text-decoration:underline dotted var(--text-3);text-underline-offset:3px;cursor:help\">annualized funding<\u002Fspan> of −42.75%.<\u002Fdiv>\n          <div style=\"position:relative;margin-top:12px\">\n            <div style=\"background:var(--surface-3);border:1px solid var(--border-strong);border-radius:8px;padding:12px 13px;max-width:300px\">\n              <div style=\"font-size:9px;left:26px;top:-5px;position:absolute;width:9px;height:9px;background:var(--surface-3);border-left:1px solid var(--border-strong);border-top:1px solid var(--border-strong);transform:rotate(45deg)\"><\u002Fdiv>\n              <div style=\"font-weight:600;font-size:12px;margin-bottom:5px;color:var(--text-1)\">Annualized funding<\u002Fdiv>\n              <div style=\"font-size:12px;color:var(--text-2);line-height:1.5\">The recurring fee one side pays the other, scaled to a yearly rate. <span style=\"color:var(--short)\">Negative<\u002Fspan> means shorts are paying — the crowd is leaning short and it's costing them to stay in.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  // ── intensity → color ramp (oklch; lightness + chroma both climb) ──\n  skewColor(side, t){\n    if(side==='none') return 'var(--balanced)';\n    if(side==='long') return `oklch(${(0.50+0.26*t).toFixed(3)} ${(0.045+0.105*t).toFixed(3)} 195)`;\n    return `oklch(${(0.55+0.24*t).toFixed(3)} ${(0.055+0.105*t).toFixed(3)} 70)`;\n  }\n  pipCount(t){ return t<=0 ? 0 : Math.max(1, Math.ceil(t*5)); }\n  pips(side, t){\n    const n=this.pipCount(t), col=this.skewColor(side,t);\n    return Array.from({length:5},(_,i)=>({color: i<n ? col : 'var(--pip-off)'}));\n  }\n  // ── formatters ──\n  usd(n){\n    const a=Math.abs(n);\n    if(a>=1e9) return '$'+(n/1e9).toFixed(2)+'B';\n    if(a>=1e6){ const v=n/1e6; return '$'+(v>=100?v.toFixed(0):v.toFixed(1))+'M'; }\n    if(a>=1e3) return '$'+(n/1e3).toFixed(0)+'K';\n    return '$'+n.toFixed(0);\n  }\n  pct(n){ return (n>0?'+':'')+n.toFixed(2)+'%'; }\n  price(n){\n    if(n>=1000) return n.toLocaleString('en-US',{maximumFractionDigits:0});\n    if(n>=1) return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:4});\n    return n.toPrecision(3);\n  }\n  trendVM(t){\n    if(!t || t.state==='warming') return {warming:true, normal:false};\n    const m={rising:{glyph:'▲',word:'Rising',color:'var(--rising)'},\n             unwinding:{glyph:'▼',word:'Unwinding',color:'var(--unwinding)'},\n             flat:{glyph:'—',word:'Flat',color:'var(--flat)'}}[t.direction]||{glyph:'—',word:'Flat',color:'var(--flat)'};\n    return {warming:false, normal:true, glyph:m.glyph, word:m.word, color:m.color,\n            pct:(t.pctChange>0?'+':'')+t.pctChange.toFixed(1)+'%'};\n  }\n  rowVM(r){\n    const s=r.skew, bal=s.side==='none';\n    const skewTextCol = bal?'var(--balanced)':(s.side==='long'?'var(--long)':'var(--short)');\n    return {\n      coin:r.coin, lev:r.maxLeverage+'×', price:this.price(r.markPx),\n      isBalanced:bal, notBalanced:!bal, label:s.label, skewTextColor:skewTextCol,\n      pips:this.pips(s.side, s.intensity),\n      funding:this.pct(r.annualizedFundingPct),\n      fundingColor: r.annualizedFundingPct>0?'var(--long)':(r.annualizedFundingPct<0?'var(--short)':'var(--text-2)'),\n      oi:this.usd(r.oiNotional), vol:this.usd(r.dayNtlVlm),\n      chg:(r.change24hPct>0?'▲ ':'▽ ')+this.pct(r.change24hPct),\n      chgColor: r.change24hPct>0?'var(--text-1)':'var(--text-3)',\n      trend:this.trendVM(r.oiTrend),\n      stale:!!r.stale, staleAge:r.staleAge||'', dim:r.stale?0.5:1\n    };\n  }\n  get data(){\n    return [\n      {coin:'SOL',maxLeverage:20,markPx:69.0,change24hPct:-5.16,annualizedFundingPct:-42.75,skew:{label:'Shorts crowded',side:'short',intensity:0.84},oiNotional:363419137,dayNtlVlm:470422716,oiTrend:{state:'ok',direction:'unwinding',pctChange:-3.1}},\n      {coin:'TIA',maxLeverage:10,markPx:3.10,change24hPct:-7.9,annualizedFundingPct:-36.0,skew:{label:'Shorts crowded',side:'short',intensity:0.74},oiNotional:54000000,dayNtlVlm:90000000,oiTrend:{state:'ok',direction:'unwinding',pctChange:-5.5},stale:true,staleAge:'47s'},\n      {coin:'PEPE',maxLeverage:10,markPx:0.0000071,change24hPct:4.1,annualizedFundingPct:31.2,skew:{label:'Longs crowded',side:'long',intensity:0.67},oiNotional:120000000,dayNtlVlm:540000000,oiTrend:{state:'ok',direction:'rising',pctChange:7.7}},\n      {coin:'WIF',maxLeverage:10,markPx:1.92,change24hPct:-6.4,annualizedFundingPct:-28.3,skew:{label:'Shorts crowded',side:'short',intensity:0.57},oiNotional:88000000,dayNtlVlm:190000000,oiTrend:{state:'ok',direction:'unwinding',pctChange:-4.2}},\n      {coin:'ARB',maxLeverage:20,markPx:0.42,change24hPct:-3.3,annualizedFundingPct:-18.9,skew:{label:'Shorts crowded',side:'short',intensity:0.42},oiNotional:76000000,dayNtlVlm:150000000,oiTrend:{state:'ok',direction:'unwinding',pctChange:-2.0}},\n      {coin:'HYPE',maxLeverage:10,markPx:28.4,change24hPct:8.2,annualizedFundingPct:24.1,skew:{label:'Longs crowded',side:'long',intensity:0.31},oiNotional:410000000,dayNtlVlm:880000000,oiTrend:{state:'ok',direction:'rising',pctChange:5.1}},\n      {coin:'AVAX',maxLeverage:20,markPx:19.7,change24hPct:-1.2,annualizedFundingPct:12.6,skew:{label:'Longs crowded',side:'long',intensity:0.21},oiNotional:140000000,dayNtlVlm:260000000,oiTrend:{state:'ok',direction:'rising',pctChange:1.8}},\n      {coin:'ATOM',maxLeverage:5,markPx:1.7167,change24hPct:-4.50,annualizedFundingPct:10.95,skew:{label:'Longs crowded',side:'long',intensity:0.13},oiNotional:3046807,dayNtlVlm:395063,oiTrend:{state:'warming',direction:null,pctChange:null}},\n      {coin:'SUI',maxLeverage:10,markPx:1.34,change24hPct:-2.8,annualizedFundingPct:5.4,skew:{label:'Longs crowded',side:'long',intensity:0.11},oiNotional:95000000,dayNtlVlm:180000000,oiTrend:{state:'warming',direction:null,pctChange:null}},\n      {coin:'BTC',maxLeverage:40,markPx:62099,change24hPct:-3.71,annualizedFundingPct:6.96,skew:{label:'Longs crowded',side:'long',intensity:0.04},oiNotional:2023650263,dayNtlVlm:2929076582,oiTrend:{state:'ok',direction:'rising',pctChange:2.3}},\n      {coin:'ETH',maxLeverage:25,markPx:1649.7,change24hPct:-5.14,annualizedFundingPct:-2.02,skew:{label:'Balanced',side:'none',intensity:0},oiNotional:1209141041,dayNtlVlm:1501247728,oiTrend:{state:'ok',direction:'flat',pctChange:0.4}},\n      {coin:'LINK',maxLeverage:20,markPx:11.2,change24hPct:-0.4,annualizedFundingPct:0.8,skew:{label:'Balanced',side:'none',intensity:0},oiNotional:190000000,dayNtlVlm:300000000,oiTrend:{state:'ok',direction:'flat',pctChange:0.1}}\n    ];\n  }\n  headline(side){\n    return this.data.filter(r=>r.skew.side===side && !r.stale)\n      .sort((a,b)=>b.skew.intensity-a.skew.intensity);\n  }\n  hlItem(r){ return {coin:r.coin, lev:r.maxLeverage+'×', label:r.skew.label,\n    funding:this.pct(r.annualizedFundingPct), pips:this.pips(r.skew.side,r.skew.intensity), intensity:r.skew.intensity}; }\n  interp(r){\n    const t=r.skew.intensity, f=Math.abs(r.annualizedFundingPct).toFixed(1);\n    const qual = t>=0.6?'the most one-sided book on the board':t>=0.3?'a heavily crowded book':'a mild lean';\n    if(r.skew.side==='long') return `Longs are paying ${f}% a year to hold ${r.coin} — ${qual}.`;\n    return `Shorts are paying ${f}% a year to stay short ${r.coin} — ${qual}.`;\n  }\n  scaleStop(side,t,note){\n    return {t:t.toFixed(2), balanced:t===0, notBalanced:t!==0, pips:this.pips(side,t), note};\n  }\n  renderVals(){\n    const longs=this.headline('long'), shorts=this.headline('short');\n    const longStops=[[0,'neutral axis'],[0.04,'BTC · barely'],[0.13,'ATOM · mild'],[0.40,'building'],[0.67,'PEPE · strong'],[1,'maximal']]\n      .map(([t,n])=>this.scaleStop('long',t,n));\n    const shortStops=[[0,'neutral axis'],[0.05,'barely'],[0.20,'mild'],[0.57,'WIF · strong'],[0.84,'SOL · extreme'],[1,'maximal']]\n      .map(([t,n])=>this.scaleStop('short',t,n));\n    const states=[\n      {title:'Balanced',balanced:true,pipped:false,warming:false,label:'Balanced',labelColor:'var(--balanced)',italic:'normal',note:'Intensity 0. Funding near zero — neither side is paying. Reads calm and intentional, not empty.'},\n      {title:'Mild skew',balanced:false,pipped:true,warming:false,pips:this.pips('long',0.13),label:'Longs crowded',labelColor:'var(--long)',italic:'normal',note:'~0.13. One faint segment. Where most of the board sits.'},\n      {title:'Extreme skew',balanced:false,pipped:true,warming:false,pips:this.pips('short',0.84),label:'Shorts crowded',labelColor:'var(--short)',italic:'normal',note:'~0.84. Five bright segments — pulls the eye instantly.'},\n      {title:'Warming up',balanced:false,pipped:false,warming:true,label:'Building history…',labelColor:'var(--text-3)',italic:'italic',note:'No OI history yet at launch. A live pulse, never fake zeros.'},\n      {title:'Stale',balanced:false,pipped:true,warming:false,pips:this.pips('short',0.74),label:'Shorts crowded',labelColor:'var(--short)',italic:'normal',note:'Feed blipped. Last-known values dim to 50% with a STALE chip.'}\n    ];\n    const baseSwatches=[\n      {name:'--bg',val:'#08090b'},{name:'--surface-1',val:'#0d0f13'},{name:'--surface-2',val:'#13161c'},\n      {name:'--surface-3',val:'#1a1e25'},{name:'--border',val:'#1e222a'},\n      {name:'--text-1',val:'#e9ecf1'},{name:'--text-2',val:'#a6aebb'},{name:'--text-3',val:'#6b7480'},{name:'--text-4',val:'#454c56'}\n    ];\n    const meaningSwatches=[\n      {name:'--long',val:'var(--long)'},{name:'--short',val:'var(--short)'},{name:'--balanced',val:'var(--balanced)'},\n      {name:'--rising',val:'var(--rising)'},{name:'--unwinding',val:'var(--unwinding)'},{name:'--stale',val:'var(--stale)'},\n      {name:'--pip-off',val:'var(--pip-off)'}\n    ];\n    const typeSamples=[\n      {sample:'62,099.40',fam:\"'JetBrains Mono',monospace\",px:'26px',wt:'600',label:'mono / hero 26'},\n      {sample:'Most crowded longs',fam:\"'Geist',sans-serif\",px:'19px',wt:'600',label:'Geist / title 19'},\n      {sample:'Shorts crowded',fam:\"'Geist',sans-serif\",px:'13px',wt:'500',label:'Geist / body 13'},\n      {sample:'−42.75%',fam:\"'JetBrains Mono',monospace\",px:'13px',wt:'500',label:'mono / data 13'},\n      {sample:'ANNUALIZED FUNDING',fam:\"'Geist',sans-serif\",px:'10.5px',wt:'600',label:'Geist / label 10.5'}\n    ];\n    return {\n      rows:this.data.map(r=>this.rowVM(r)),\n      hlLongTop:{...this.hlItem(longs[0]), interp:this.interp(longs[0])},\n      hlShortTop:{...this.hlItem(shorts[0]), interp:this.interp(shorts[0])},\n      hlLongRest:longs.slice(1,3).map(r=>this.hlItem(r)),\n      hlShortRest:shorts.slice(1,3).map(r=>this.hlItem(r)),\n      longStops, shortStops, states, baseSwatches, meaningSwatches, typeSamples\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Crowd Dashboard.dc"}
